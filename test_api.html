<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpyLeads API Tester</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f5f7fa; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { margin-top: 0; color: #2c3e50; }
        .section { padding: 15px; border: 1px solid #e1e8ed; border-radius: 6px; margin-bottom: 20px; background: #fafbfc; }
        .section h2 { margin-top: 0; font-size: 1.2em; color: #34495e; }
        input, select, button { padding: 8px 12px; margin: 5px 0; border: 1px solid #ccd6dd; border-radius: 4px; }
        input { width: 200px; }
        button { background: #3498db; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #2980b9; }
        .token-box { word-break: break-all; background: #f1f2f6; padding: 10px; border-radius: 4px; font-size: 0.9em; color: #555; }
        #log { background: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 6px; height: 300px; overflow-y: auto; font-family: monospace; white-space: pre-wrap; }
        .success { color: #2ecc71; }
        .error { color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <h1>SpyLeads API Tester 🚀</h1>

    <!-- AUTH SECTION -->
    <div class="section">
        <h2>1. Authentication</h2>
        <input type="email" id="email" placeholder="Email" value="test@spyleads.io">
        <input type="password" id="password" placeholder="Password" value="password123">
        <br>
        <button onclick="testAPI('POST', '/auth/register', {email: email.value, password: password.value})">Register</button>
        <button onclick="testAPI('POST', '/auth/login', {email: email.value, password: password.value})">Login</button>
        
        <p><strong>Current Token:</strong></p>
        <div id="tokenDisplay" class="token-box">No token yet. Login first!</div>
    </div>

    <!-- PROFILE SECTION -->
    <div class="section">
        <h2>2. Profile & Quota</h2>
        <button onclick="testAPI('GET', '/auth/me', null, true)">Get Profile (/me)</button>
        <button onclick="testAPI('GET', '/auth/quota', null, true)">Get Quota</button>
    </div>

    <!-- EXTRACTION SECTION -->
    <div class="section">
        <h2>3. Extraction Test</h2>
        <select id="extractType">
            <option value="hashtag">Hashtag</option>
            <option value="location">Location</option>
        </select>
        <input type="text" id="extractValue" placeholder="e.g. fitness" value="fitness">
        <input type="number" id="maxResults" placeholder="Max Results" value="2" style="width: 100px;">
        <button onclick="testExtraction()">Run Extraction</button>
    </div>

    <!-- LOG OUTPUT -->
    <h2>Response Log:</h2>
    <div id="log">Waiting for action...</div>
</div>

<script>
    const API_URL = "http://127.0.0.1:5000";
    let currentToken = "";

    function logResponse(endpoint, status, data, isError) {
        const logDiv = document.getElementById('log');
        const colorClass = isError ? 'error' : 'success';
        const time = new Date().toLocaleTimeString();
        
        const logEntry = `<span style="color:#bdc3c7">[${time}] ${endpoint} (Status: ${status})</span>\n<span class="${colorClass}">${JSON.stringify(data, null, 2)}</span>\n\n`;
        logDiv.innerHTML = logEntry + logDiv.innerHTML;
    }

    async function testAPI(method, endpoint, body = null, useToken = false) {
        const headers = { "Content-Type": "application/json" };
        if (useToken) {
            if (!currentToken) {
                alert("Please login first to get a token!");
                return;
            }
            headers["Authorization"] = "Bearer " + currentToken;
        }

        const options = { method, headers };
        if (body) options.body = JSON.stringify(body);

        try {
            document.getElementById('log').innerHTML = `<span style="color:#f39c12">Loading ${endpoint}...</span>\n\n` + document.getElementById('log').innerHTML;
            
            const response = await fetch(API_URL + endpoint, options);
            const data = await response.json();
            
            logResponse(endpoint, response.status, data, !response.ok);

            // Save token if login/register was successful
            if (response.ok && data.token) {
                currentToken = data.token;
                document.getElementById('tokenDisplay').innerText = currentToken;
            }
        } catch (error) {
            logResponse(endpoint, "Network Error", error.message, true);
        }
    }

    function testExtraction() {
        const type = document.getElementById('extractType').value;
        const value = document.getElementById('extractValue').value;
        const maxResults = parseInt(document.getElementById('maxResults').value);

        testAPI('POST', '/extract', { type, value, maxResults }, true);
    }
</script>

</body>
</html>
